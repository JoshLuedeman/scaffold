name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6 AM UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['csharp', 'javascript-typescript']
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build .NET
        if: matrix.language == 'csharp'
        run: dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/Scaffold.Api/Dockerfile -t scaffold-api:scan .

      - name: Build Web image
        run: docker build -f src/Scaffold.Web/Dockerfile -t scaffold-web:scan .

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scaffold-api:scan'
          format: 'sarif'
          output: 'api-trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Scan Web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scaffold-web:scan'
          format: 'sarif'
          output: 'web-trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload API scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'api-trivy-results.sarif'
          category: 'container-api'

      - name: Upload Web scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'web-trivy-results.sarif'
          category: 'container-web'
