name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push API image
        run: |
          docker build -f src/Scaffold.Api/Dockerfile \
            -t ${{ vars.ACR_LOGIN_SERVER }}/scaffold-api:${{ github.sha }} \
            -t ${{ vars.ACR_LOGIN_SERVER }}/scaffold-api:latest \
            .
          docker push ${{ vars.ACR_LOGIN_SERVER }}/scaffold-api:${{ github.sha }}
          docker push ${{ vars.ACR_LOGIN_SERVER }}/scaffold-api:latest

      - name: Deploy API to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ vars.CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.RESOURCE_GROUP }}
          imageToDeploy: ${{ vars.ACR_LOGIN_SERVER }}/scaffold-api:${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Scaffold.Web/package-lock.json

      - name: Build frontend
        working-directory: src/Scaffold.Web
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_AZURE_CLIENT_ID: ${{ vars.AZURE_AD_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ vars.AZURE_AD_TENANT_ID }}

      - name: Deploy frontend to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: src/Scaffold.Web
          output_location: dist
          skip_app_build: true

      - name: Run post-deployment migrations
        run: |
          dotnet tool restore
          dotnet ef database update \
            --project src/Scaffold.Infrastructure \
            --startup-project src/Scaffold.Api \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}"
        env:
          DOTNET_ROOT: /usr/share/dotnet

      - name: Create GitHub deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ inputs.environment || 'dev' }}';
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 0,
              state: state,
              environment: environment,
              description: `Deployed ${context.sha.substring(0, 7)} to ${environment}`
            });
